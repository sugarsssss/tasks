<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📋</text></svg>">
  <title>タスク管理</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans",sans-serif;background:#0f0f0f;color:#e8e8e8;min-height:100vh;padding:20px 16px}
    #lock-screen{position:fixed;inset:0;background:#0f0f0f;display:flex;align-items:center;justify-content:center;z-index:9999}
    #lock-screen.hidden{display:none}
    .lock-box{width:100%;max-width:320px;padding:32px 24px;background:#181818;border-radius:16px;border:1px solid #222;text-align:center}
    .lock-icon{font-size:36px;margin-bottom:16px}
    .lock-title{font-size:16px;font-weight:700;color:#fff;margin-bottom:6px}
    .lock-sub{font-size:12px;color:#555;margin-bottom:20px}
    .lock-input{width:100%;background:#111;border:1px solid #2a2a2a;border-radius:8px;color:#e8e8e8;font-size:15px;padding:12px 14px;text-align:center;letter-spacing:.2em;outline:none;font-family:inherit}
    .lock-input:focus{border-color:#7c6fcd}
    .lock-btn{margin-top:12px;width:100%;background:#7c6fcd;border:none;color:#fff;font-size:14px;font-weight:700;padding:11px;border-radius:8px;cursor:pointer;transition:background .2s}
    .lock-btn:hover{background:#6a5eb8}
    .lock-error{font-size:12px;color:#ff6060;margin-top:10px;min-height:18px}
    .container{max-width:680px;margin:0 auto}
    nav{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap}
    nav button{font-size:12px;padding:6px 14px;border-radius:20px;cursor:pointer;color:#888;border:1px solid #2a2a2a;background:transparent;transition:all .2s}
    nav button.active,nav button:hover{color:#fff;border-color:#7c6fcd;background:#1a1530}
    .section{display:none;animation:fadeIn .2s ease}
    .section.active{display:block}
    @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    .page-header{margin-bottom:24px}
    .page-date{font-size:12px;color:#555;margin-bottom:4px}
    .page-title{font-size:20px;font-weight:700;color:#fff}
    .progress-bar-wrap{margin-top:8px}
    .progress-label{font-size:11px;color:#666;margin-bottom:4px}
    .progress-bar{height:4px;background:#1e1e1e;border-radius:2px;overflow:hidden}
    .progress-fill{height:100%;background:#7c6fcd;border-radius:2px;transition:width .4s ease}
    .block-title{font-size:11px;font-weight:600;letter-spacing:.1em;color:#666;text-transform:uppercase;margin-bottom:8px;margin-top:20px}
    .task-item{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;background:#181818;border-radius:8px;margin-bottom:5px;border:1px solid #212121;transition:border-color .2s}
    .task-item input[type=checkbox]{width:15px;height:15px;accent-color:#7c6fcd;margin-top:2px;flex-shrink:0;cursor:pointer}
    .task-text{font-size:13px;line-height:1.5;flex:1}
    .task-time{font-size:11px;color:#444;white-space:nowrap;padding-left:8px}
    .must-do{background:#14112a;border:1px solid #2d2460;border-radius:8px;padding:12px;margin-top:20px}
    .must-do-label{font-size:10px;color:#7c6fcd;font-weight:700;letter-spacing:.12em;margin-bottom:5px}
    .must-do-text{font-size:13px;color:#b8aaff;line-height:1.5}
    .quote-box{background:#111;border-left:3px solid #333;padding:10px 12px;border-radius:0 6px 6px 0;margin-top:12px}
    .quote-label{font-size:10px;color:#444;font-weight:600;letter-spacing:.1em;margin-bottom:3px}
    .quote-text{font-size:13px;color:#888;font-style:italic}
    .priority-badge{color:#ff6060;font-size:10px;font-weight:700;margin-left:6px}
    .x-post-box{background:#0d1117;border:1px solid #2a2a3a;border-radius:8px;padding:14px;margin-top:16px}
    .x-post-label{font-size:10px;color:#1d9bf0;font-weight:700;letter-spacing:.1em;margin-bottom:8px;display:flex;align-items:center;gap:6px}
    .x-post-text{font-size:13px;line-height:1.7;color:#e8e8e8;white-space:pre-wrap;word-break:break-all}
    .x-char-count{font-size:11px;color:#555;margin-top:6px;text-align:right}
    .x-post-btns{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
    .copy-btn{background:#1d9bf0;border:none;color:#fff;font-size:12px;font-weight:600;padding:7px 16px;border-radius:20px;cursor:pointer;transition:background .2s}
    .copy-btn:hover{background:#1a8cd8}
    .copy-btn.copied{background:#4caf7d}
    .tweet-btn{background:#000;border:1px solid #333;color:#fff;font-size:12px;font-weight:600;padding:7px 16px;border-radius:20px;cursor:pointer;transition:background .2s}
    .tweet-btn:hover{background:#111;border-color:#1d9bf0}
    .qa-box{background:#111;border:1px solid #222;border-radius:8px;padding:14px;margin-top:12px}
    .qa-label{font-size:10px;color:#f0a500;font-weight:700;letter-spacing:.1em;margin-bottom:8px}
    .qa-question{font-size:13px;color:#ccc;line-height:1.6;margin-bottom:10px}
    .qa-input{width:100%;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:6px;color:#e8e8e8;font-size:13px;padding:10px 12px;resize:vertical;min-height:80px;font-family:inherit;line-height:1.6}
    .qa-input:focus{outline:none;border-color:#f0a500}
    .qa-input-row{position:relative}
    .qa-mic-btn{position:absolute;bottom:10px;right:10px;background:#2a2a2a;border:1px solid #3a3a3a;border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;font-size:15px}
    .qa-mic-btn:hover{background:#3a3a3a}
    .qa-mic-btn.recording{background:#c0392b;border-color:#e74c3c;animation:pulse 1s infinite}
    @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(231,76,60,.4)}50%{box-shadow:0 0 0 6px rgba(231,76,60,0)}}
    .qa-submit{margin-top:8px;background:#f0a500;border:none;color:#000;font-size:12px;font-weight:700;padding:7px 16px;border-radius:20px;cursor:pointer;transition:background .2s}
    .qa-submit:hover{background:#d4920a}
    .qa-submit.sent{background:#4caf7d;color:#fff}
    .goal-item{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;background:#181818;border-radius:8px;margin-bottom:5px;border:1px solid #212121;transition:border-color .2s}
    .goal-item input[type=checkbox]{width:15px;height:15px;accent-color:#4caf7d;margin-top:2px;flex-shrink:0;cursor:pointer}
    .goal-text{font-size:13px;line-height:1.5;flex:1}
    .cat-badge{font-size:10px;padding:2px 7px;border-radius:10px;margin-left:6px;font-weight:600}
    .cat-booth{background:#1a1530;color:#9b8bff}.cat-sns{background:#0d2020;color:#4ecdc4}.cat-biz{background:#1a1200;color:#f0a500}.cat-revenue{background:#1a0f0f;color:#ff6b6b}
    .history-item{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:#181818;border-radius:8px;margin-bottom:5px;border:1px solid #212121;cursor:pointer;transition:border-color .2s}
    .history-item:hover{border-color:#7c6fcd}
    .history-date{font-size:13px}
    .history-rate{font-size:12px;color:#7c6fcd;font-weight:600}
    .empty{color:#444;font-size:13px;padding:20px 0;text-align:center}
    .spinner{text-align:center;color:#333;padding:40px;font-size:13px}
    .thumb-add-btn{display:flex;align-items:center;gap:6px;background:transparent;border:1px dashed #333;color:#666;font-size:12px;font-weight:600;padding:8px 14px;border-radius:8px;cursor:pointer;width:100%;margin-top:6px;transition:all .2s}
    .thumb-add-btn:hover{border-color:#7c6fcd;color:#9b8bff}
    .thumb-form{background:#181818;border:1px solid #2d2460;border-radius:8px;padding:12px;margin-top:6px;display:none}
    .thumb-form.open{display:block;animation:fadeIn .2s ease}
    .thumb-form-label{font-size:10px;color:#7c6fcd;font-weight:700;letter-spacing:.1em;margin-bottom:8px}
    .thumb-form input{width:100%;background:#111;border:1px solid #2a2a2a;border-radius:6px;color:#e8e8e8;font-size:13px;padding:9px 11px;font-family:inherit;outline:none;margin-bottom:8px}
    .thumb-form input:focus{border-color:#7c6fcd}
    .thumb-form input[type=date]{color-scheme:dark}
    .thumb-form-btns{display:flex;gap:8px;margin-top:4px}
    .thumb-save-btn{background:#7c6fcd;border:none;color:#fff;font-size:12px;font-weight:700;padding:7px 18px;border-radius:20px;cursor:pointer;transition:background .2s}
    .thumb-save-btn:hover{background:#6a5eb8}
    .thumb-save-btn:disabled{background:#333;color:#555;cursor:not-allowed}
    .thumb-cancel-btn{background:transparent;border:1px solid #333;color:#666;font-size:12px;padding:7px 14px;border-radius:20px;cursor:pointer}
  </style>
</head>
<body>
<div id="lock-screen">
  <div class="lock-box">
    <div class="lock-icon">🔒</div>
    <div class="lock-title">タスク管理</div>
    <div class="lock-sub">パスワードを入力してください</div>
    <input class="lock-input" id="lock-input" type="password" placeholder="••••••••"
      onkeydown="if(event.key==='Enter')unlock()">
    <button class="lock-btn" onclick="unlock()">入る</button>
    <div class="lock-error" id="lock-error"></div>
  </div>
</div>
<div class="container">
  <nav>
    <button onclick="show('today',this)" class="active">📋 今日</button>
    <button onclick="show('week',this)">📅 今週</button>
    <button onclick="show('month',this)">🗓 今月</button>
    <button onclick="show('history',this)">📂 履歴</button>
  </nav>

  <div id="sec-today" class="section active">
    <div class="page-header">
      <div class="page-date" id="today-date"></div>
      <div class="page-title">今日のタスク</div>
      <div class="progress-bar-wrap">
        <div class="progress-label" id="today-plabel">読み込み中...</div>
        <div class="progress-bar"><div class="progress-fill" id="today-pfill" style="width:0%"></div></div>
      </div>
    </div>
    <div id="today-body"><div class="spinner">読み込み中...</div></div>
  </div>

  <div id="sec-week" class="section">
    <div class="page-header">
      <div class="page-date" id="week-date"></div>
      <div class="page-title">今週の目標</div>
      <div class="progress-bar-wrap">
        <div class="progress-label" id="week-plabel">読み込み中...</div>
        <div class="progress-bar"><div class="progress-fill" id="week-pfill" style="width:0%"></div></div>
      </div>
    </div>
    <div id="week-body"><div class="spinner">読み込み中...</div></div>
  </div>

  <div id="sec-month" class="section">
    <div class="page-header">
      <div class="page-date" id="month-date"></div>
      <div class="page-title">今月の目標</div>
      <div class="progress-bar-wrap">
        <div class="progress-label" id="month-plabel">読み込み中...</div>
        <div class="progress-bar"><div class="progress-fill" id="month-pfill" style="width:0%"></div></div>
      </div>
    </div>
    <div id="month-body"><div class="spinner">読み込み中...</div></div>
  </div>

  <div id="sec-history" class="section">
    <div class="page-header">
      <div class="page-title">過去のタスク履歴</div>
    </div>
    <div id="history-body"><div class="spinner">読み込み中...</div></div>
  </div>
</div>

<script>
var PASS="sugar2026";
function unlock(){
  var v=document.getElementById("lock-input").value;
  if(v===PASS){localStorage.setItem("auth","1");document.getElementById("lock-screen").classList.add("hidden");}
  else{document.getElementById("lock-error").textContent="パスワードが違います";document.getElementById("lock-input").value="";}
}
if(localStorage.getItem("auth")==="1"){document.getElementById("lock-screen").classList.add("hidden");}

const REPO="sugarsssss/tasks";
const RAW="https://raw.githubusercontent.com/"+REPO+"/main";
const API="https://api.github.com/repos/"+REPO;

function show(name,btn){
  document.querySelectorAll("nav button").forEach(b=>b.classList.remove("active"));
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  btn.classList.add("active");
  document.getElementById("sec-"+name).classList.add("active");
  if(name==="history") loadHistory();
}

function getDone(k){return JSON.parse(localStorage.getItem("done-"+k)||"{}")}
function setDone(k,id,v){var d=getDone(k);d[id]=v;localStorage.setItem("done-"+k,JSON.stringify(d))}

function calcPct(k,cls){
  var total=document.querySelectorAll("."+cls).length;
  var done=Object.values(getDone(k)).filter(Boolean).length;
  return{total:total,done:done,pct:total?Math.round(done/total*100):0};
}
function updateBar(k,cls,prefix){
  var r=calcPct(k,cls);
  document.getElementById(prefix+"-plabel").textContent=r.done+" / "+r.total+" 完了 ("+r.pct+"%)";
  document.getElementById(prefix+"-pfill").style.width=r.pct+"%";
}

// TODAY
fetch(RAW+"/data/today.json?t="+Date.now())
  .then(function(r){return r.json()}).then(function(d){
    document.getElementById("today-date").textContent=d.dateJa||d.date||"";localStorage.setItem("today-date",d.date);
    var html="";
    var secs=d.sections||{};
    Object.keys(secs).forEach(function(k){
      var sec=secs[k];
      html+='<div class="block-title">'+sec.label+(sec.priority?'<span class="priority-badge">最優先</span>':'')+' </div>';
      (sec.tasks||[]).forEach(function(t){
        var done=getDone(d.date)[t.id];
        html+='<div class="task-item"><input type="checkbox" class="t-today" id="t'+t.id+'" '+(done?"checked":"")+
          ' onchange="setDone(\''+d.date+'\',\''+t.id+'\',this.checked);updateBar(\''+d.date+'\',\'t-today\',\'today\')">'+
          '<label class="task-text" for="t'+t.id+'" style="'+(done?"text-decoration:line-through;color:#555":"")+'">'+(t.text||"")+'</label>'+
          '<span class="task-time">'+(t.time||"")+'</span></div>';
      });
      if(k==='thumbnail'){
        html+='<button class="thumb-add-btn" onclick="toggleThumbForm()">＋ サムネを追加</button>'+
          '<div class="thumb-form" id="thumb-form">'+
            '<div class="thumb-form-label">🖼 新しいサムネ案件を追加</div>'+
            '<input type="text" id="thumb-name" placeholder="案件名（例：ヒロキさんのサムネ）">'+
            '<input type="date" id="thumb-deadline">'+
            '<div class="thumb-form-btns">'+
              '<button class="thumb-save-btn" id="thumb-save-btn" onclick="saveThumb()">追加する</button>'+
              '<button class="thumb-cancel-btn" onclick="toggleThumbForm()">キャンセル</button>'+
            '</div>'+
          '</div>';
      }
    });
    if(d.mustDo) html+='<div class="must-do"><div class="must-do-label">⚡ MUST DO</div><div class="must-do-text">'+d.mustDo+'</div></div>';
    if(d.quote)  html+='<div class="quote-box"><div class="quote-label">💬 今日の一言</div><div class="quote-text">'+d.quote+'</div></div>';
    if(d.xPost){
      var charCount=(d.xPost||"").length;
      var countColor=charCount>140?"#ff6060":charCount>120?"#f0a500":"#555";
      html+='<div class="x-post-box">'+
        '<div class="x-post-label">𝕏 今日のX投稿案</div>'+
        '<div class="x-post-text" id="xpost-text">'+escHtml(d.xPost)+'</div>'+
        '<div class="x-char-count" style="color:'+countColor+'">'+charCount+' / 140文字</div>'+
        '<div class="x-post-btns">'+
          '<button class="copy-btn" id="copy-btn" onclick="copyPost(\'xpost-text\',\'copy-btn\')">コピー</button>'+
          '<button class="tweet-btn" onclick="openXPost(\'xpost-text\')">𝕏 Xに投稿</button>'+
        '</div>'+
      '</div>';
    }
    if(d.newsPost){
      var nc=(d.newsPost||"").length;
      var ncColor=nc>140?"#ff6060":nc>120?"#f0a500":"#555";
      html+='<div class="x-post-box" style="border-color:#2a3a2a;margin-top:8px">'+
        '<div class="x-post-label" style="color:#4ecdc4">📰 時事ニュース投稿案</div>'+
        (d.newsSource?'<div style="font-size:11px;color:#445;margin-bottom:6px">ソース：'+escHtml(d.newsSource)+'</div>':'')+
        '<div class="x-post-text" id="newspost-text">'+escHtml(d.newsPost)+'</div>'+
        '<div class="x-char-count" style="color:'+ncColor+'">'+nc+' / 140文字</div>'+
        '<div class="x-post-btns">'+
          '<button class="copy-btn" id="news-copy-btn" onclick="copyPost(\'newspost-text\',\'news-copy-btn\')">コピー</button>'+
          '<button class="tweet-btn" onclick="openXPost(\'newspost-text\')">𝕏 Xに投稿</button>'+
        '</div>'+
      '</div>';
    }
    if(d.dailyQuestion){
      var savedAns=localStorage.getItem("qa-ans-"+d.date)||"";
      var alreadySent=localStorage.getItem("qa-sent-"+d.date)==="1";
      html+='<div class="qa-box">'+
        '<div class="qa-label">💡 今日の質問（回答→明日の投稿に反映）</div>'+
        '<div class="qa-question">'+escHtml(d.dailyQuestion)+'</div>'+
        '<div class="qa-input-row">'+
        '<textarea class="qa-input" id="qa-input" placeholder="ここに回答を入力...">'+(alreadySent?savedAns:"")+'</textarea>'+
        '<button class="qa-mic-btn" id="qa-mic-btn" onclick="toggleMic()" title="音声入力">🎤</button>'+
        '</div>'+
        '<button class="qa-submit'+(alreadySent?" sent":"")+'" id="qa-submit" onclick="submitQA(\''+d.date+'\')">'+(alreadySent?"✓ 送信済み":"回答を送信")+'</button>'+
      '</div>';
    }
    document.getElementById("today-body").innerHTML=html;
    updateBar(d.date,"t-today","today");
  }).catch(function(){document.getElementById("today-body").innerHTML='<div class="empty">明日の朝9時に最初のタスクが生成されます。</div>';
    document.getElementById("today-plabel").textContent="";});

function escHtml(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}

function openXPost(elId){
  var el=document.getElementById(elId||"xpost-text");
  if(!el)return;
  window.open("https://twitter.com/intent/tweet?text="+encodeURIComponent(el.innerText),"_blank");
}

function copyPost(elId,btnId){
  var el=document.getElementById(elId||"xpost-text");
  var btn=document.getElementById(btnId||"copy-btn");
  if(!el)return;
  navigator.clipboard.writeText(el.innerText).then(function(){
    btn.textContent="✓ コピーしました";
    btn.classList.add("copied");
    setTimeout(function(){btn.textContent="コピー";btn.classList.remove("copied");},2000);
  });
}

function submitQA(date){
  var answer=document.getElementById("qa-input").value.trim();
  if(!answer){alert("回答を入力してください");return;}
  var btn=document.getElementById("qa-submit");
  btn.textContent="送信中...";btn.disabled=true;
  var GITHUB_TOKEN=localStorage.getItem("gh_token")||"";
  if(!GITHUB_TOKEN){
    GITHUB_TOKEN=prompt("GitHubトークンを入力してください（初回のみ）:");
    if(!GITHUB_TOKEN){btn.textContent="回答を送信";btn.disabled=false;return;}
    localStorage.setItem("gh_token",GITHUB_TOKEN);
  }
  var payload=JSON.stringify({date:date,answer:answer,submittedAt:new Date().toISOString()});
  var encoded=btoa(unescape(encodeURIComponent(payload)));
  fetch("https://api.github.com/repos/"+REPO+"/contents/data/qa_pending.json",
    {headers:{"Authorization":"token "+GITHUB_TOKEN}})
  .then(function(r){return r.json()})
  .then(function(existing){
    var body={message:"QA回答: "+date,content:encoded};
    if(existing.sha) body.sha=existing.sha;
    return fetch("https://api.github.com/repos/"+REPO+"/contents/data/qa_pending.json",{
      method:"PUT",headers:{"Authorization":"token "+GITHUB_TOKEN,"Content-Type":"application/json"},
      body:JSON.stringify(body)});
  }).then(function(r){return r.json()})
  .then(function(result){
    if(result.content){
      localStorage.setItem("qa-ans-"+date,answer);
      localStorage.setItem("qa-sent-"+date,"1");
      btn.textContent="✓ 送信済み";btn.classList.add("sent");btn.disabled=false;
    } else {
      btn.textContent="エラー。再試行";btn.disabled=false;
    }
  }).catch(function(){btn.textContent="エラー。再試行";btn.disabled=false;});
}


function toggleThumbForm(){
  var f=document.getElementById("thumb-form");
  if(!f)return;
  f.classList.toggle("open");
  if(f.classList.contains("open")){
    // デフォルト締切を今日+3日に設定
    var dt=new Date(); dt.setDate(dt.getDate()+3);
    var iso=dt.toISOString().split("T")[0];
    document.getElementById("thumb-deadline").value=iso;
    document.getElementById("thumb-name").focus();
  }
}

function saveThumb(){
  var date=localStorage.getItem("today-date")||new Date().toISOString().split("T")[0];
  var name=document.getElementById("thumb-name").value.trim();
  var deadline=document.getElementById("thumb-deadline").value;
  if(!name){alert("案件名を入力してください");return;}
  var btn=document.getElementById("thumb-save-btn");
  btn.textContent="保存中...";btn.disabled=true;
  var GITHUB_TOKEN=localStorage.getItem("gh_token")||"";
  if(!GITHUB_TOKEN){
    GITHUB_TOKEN=prompt("GitHubトークンを入力してください（初回のみ）:");
    if(!GITHUB_TOKEN){btn.textContent="追加する";btn.disabled=false;return;}
    localStorage.setItem("gh_token",GITHUB_TOKEN);
  }
  fetch("https://api.github.com/repos/"+REPO+"/contents/data/today.json",
    {headers:{"Authorization":"token "+GITHUB_TOKEN}})
  .then(function(r){return r.json()})
  .then(function(res){
    var data=JSON.parse(atob(res.content.replace(/\n/g,"")));
    if(!data.sections.thumbnail){
      data.sections.thumbnail={label:"🖼 サムネ作成",tasks:[]};
    }
    var tasks=data.sections.thumbnail.tasks;
    var newId="th"+(tasks.length+1)+"-"+Date.now().toString(36);
    var deadlineStr=deadline?" 締切"+deadline:"";
    tasks.push({
      id:newId,
      text:"【締切"+deadline+"】"+name+"のサムネを完成させる（メリット：納品実績が積み上がり次の案件につながる）",
      time:"60分",
      deadline:deadline,
      tag:"締切あり"
    });
    var encoded=btoa(unescape(encodeURIComponent(JSON.stringify(data,null,2))));
    return fetch("https://api.github.com/repos/"+REPO+"/contents/data/today.json",{
      method:"PUT",
      headers:{"Authorization":"token "+GITHUB_TOKEN,"Content-Type":"application/json"},
      body:JSON.stringify({message:"サムネ追加: "+name,content:encoded,sha:res.sha})
    });
  }).then(function(r){return r.json()})
  .then(function(result){
    if(result.content){
      btn.textContent="✓ 追加しました";
      setTimeout(function(){location.reload();},800);
    } else {
      btn.textContent="エラー。再試行";btn.disabled=false;
    }
  }).catch(function(){btn.textContent="エラー。再試行";btn.disabled=false;});
}

// 音声入力
var micRecognition=null;
var micActive=false;
function toggleMic(){
  var btn=document.getElementById("qa-mic-btn");
  if(!btn)return;
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){alert("このブラウザは音声入力に対応していません。\nChromeをお試しください。");return;}
  if(micActive){
    if(micRecognition)micRecognition.stop();
    return;
  }
  micRecognition=new SR();
  micRecognition.lang="ja-JP";
  micRecognition.continuous=true;
  micRecognition.interimResults=false;
  micRecognition.onstart=function(){
    micActive=true;
    btn.classList.add("recording");
    btn.title="録音中（タップで停止）";
  };
  micRecognition.onresult=function(e){
    var txt="";
    for(var i=e.resultIndex;i<e.results.length;i++){
      if(e.results[i].isFinal)txt+=e.results[i][0].transcript;
    }
    var ta=document.getElementById("qa-input");
    if(ta&&txt)ta.value+=(ta.value?"　":"")+txt;
  };
  micRecognition.onend=function(){
    micActive=false;
    btn.classList.remove("recording");
    btn.title="音声入力";
  };
  micRecognition.onerror=function(){
    micActive=false;
    btn.classList.remove("recording");
  };
  micRecognition.start();
}

// HISTORY
var histLoaded=false;
function loadHistory(){
  if(histLoaded)return; histLoaded=true;
  fetch(API+"/contents/data/archive")
    .then(function(r){return r.json()}).then(function(files){
      var items=(files||[]).filter(function(f){return f.name&&f.name.endsWith(".json")})
        .sort(function(a,b){return b.name.localeCompare(a.name)});
      if(!items.length){document.getElementById("history-body").innerHTML='<div class="empty">履歴はまだありません。</div>';return;}
      var html="";
      items.forEach(function(f){
        var date=f.name.replace(".json","");
        var done=getDone(date);
        var doneN=Object.values(done).filter(Boolean).length;
        var totalN=Object.keys(done).length;
        var pct=totalN?Math.round(doneN/totalN*100):null;
        html+='<div class="history-item" onclick="location.href=\'history.html?date='+date+'\'">'+
          '<span class="history-date">'+date+'</span>'+
          '<span class="history-rate">'+(pct!==null?pct+"% 達成":"未記録")+'</span></div>';
      });
      document.getElementById("history-body").innerHTML=html;
    }).catch(function(){document.getElementById("history-body").innerHTML='<div class="empty">履歴はまだありません。</div>';});
}
