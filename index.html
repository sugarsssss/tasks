<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
<title>SUGARR DASHBOARD</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --purple:#9b5de5;--purple-dim:#2d1b69;--green:#00f5d4;--green-dim:#0d2a25;
  --pink:#f15bb5;--gold:#f0a500;--red:#ff6060;--blue:#1d9bf0;
  --dark:#0a0a12;--card:#12121e;--card2:#181828;--border:#1e1e2e;--border2:#2a2a3a;
  --text:#e8e8f0;--text2:#888;--text3:#555;
}
body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans",sans-serif;background:var(--dark);color:var(--text);min-height:100vh}

/* LOCK */
#lock-screen{position:fixed;inset:0;background:var(--dark);display:flex;align-items:center;justify-content:center;z-index:9999}
#lock-screen.hidden{display:none}
.lock-box{width:100%;max-width:320px;padding:32px 24px;background:var(--card);border-radius:16px;border:1px solid var(--border2);text-align:center}
.lock-icon{font-size:36px;margin-bottom:16px}
.lock-title{font-size:16px;font-weight:700;color:#fff;margin-bottom:6px}
.lock-sub{font-size:12px;color:var(--text3);margin-bottom:20px}
.lock-input{width:100%;background:#111;border:1px solid var(--border2);border-radius:8px;color:var(--text);font-size:15px;padding:12px 14px;text-align:center;letter-spacing:.2em;outline:none;font-family:inherit}
.lock-input:focus{border-color:var(--purple)}
.lock-btn{margin-top:12px;width:100%;background:var(--purple);border:none;color:#fff;font-size:14px;font-weight:700;padding:11px;border-radius:8px;cursor:pointer;transition:background .2s}
.lock-btn:hover{background:#8040d0}
.lock-error{font-size:12px;color:var(--red);margin-top:10px;min-height:18px}

/* WRAPPER */
.wrapper{max-width:1100px;margin:0 auto;padding:20px 16px}

/* TOP NAV */
.top-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px}
.brand{font-size:16px;font-weight:900;background:linear-gradient(135deg,var(--purple),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:.05em}
.nav-tabs{display:flex;gap:6px;flex-wrap:wrap}
.nav-tab{font-size:12px;padding:6px 14px;border-radius:20px;cursor:pointer;color:var(--text2);border:1px solid var(--border);background:transparent;transition:all .2s;font-family:inherit}
.nav-tab.active,.nav-tab:hover{color:#fff;border-color:var(--purple);background:#1a1030}
.nav-right{font-size:12px;color:var(--text3)}

/* SECTION */
.section{display:none;animation:fadeIn .2s ease}
.section.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* HERO ROW */
.hero-row{display:grid;grid-template-columns:auto 1fr auto;gap:16px;align-items:center;margin-bottom:16px}
.ring-wrap{display:flex;flex-direction:column;align-items:center;gap:6px}
.ring-container{position:relative;width:80px;height:80px}
svg.ring{transform:rotate(-90deg)}
.ring-bg{fill:none;stroke:var(--border2);stroke-width:7}
.ring-fill{fill:none;stroke:var(--green);stroke-width:7;stroke-linecap:round;stroke-dasharray:220;stroke-dashoffset:220;transition:stroke-dashoffset 1s ease}
.ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-pct{font-size:18px;font-weight:900;color:#fff;line-height:1}
.ring-sub{font-size:9px;color:var(--text3);letter-spacing:.1em}
.ring-label{font-size:10px;color:var(--text2)}

.hero-center{}
.hero-day-badge{font-size:10px;color:var(--green);font-weight:700;letter-spacing:.2em;margin-bottom:4px}
.hero-date{font-size:22px;font-weight:900;color:#fff;line-height:1.2}
.hero-sub{font-size:11px;color:var(--text3);margin-top:4px}

.streak-card{background:var(--card);border:1px solid var(--border2);border-radius:12px;padding:12px 16px;text-align:center;min-width:90px}
.streak-fire{font-size:18px;margin-bottom:2px}
.streak-num{font-size:28px;font-weight:900;color:var(--pink);line-height:1}
.streak-label{font-size:9px;color:var(--text3);letter-spacing:.15em;margin-top:2px}

/* STATS ROW */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px;text-align:center}
.stat-num{font-size:20px;font-weight:900;color:#fff}
.stat-label{font-size:9px;color:var(--text3);letter-spacing:.08em;margin-top:2px}
.stat-card.c-purple .stat-num{color:var(--purple)}
.stat-card.c-green .stat-num{color:var(--green)}
.stat-card.c-pink .stat-num{color:var(--pink)}
.stat-card.c-gold .stat-num{color:var(--gold)}

/* MAIN GRID */
.main-grid{display:grid;grid-template-columns:1fr 360px;gap:14px}
@media(max-width:760px){.main-grid{grid-template-columns:1fr}.hero-row{grid-template-columns:auto 1fr auto}.stats-row{grid-template-columns:repeat(2,1fr)}}

/* TASK AREA */
.tasks-area{}
.section-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px}
.sc-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.sc-label{font-size:10px;font-weight:700;letter-spacing:.15em;color:var(--text3);text-transform:uppercase}
.sc-count{font-size:10px;background:var(--card2);color:var(--text2);padding:2px 8px;border-radius:10px}
.sc-priority{font-size:9px;background:var(--purple-dim);color:var(--purple);padding:2px 7px;border-radius:10px;font-weight:700;letter-spacing:.1em}

.task-row{display:flex;align-items:flex-start;gap:10px;padding:9px 8px;border-radius:8px;cursor:pointer;transition:background .1s;border-bottom:1px solid var(--border)}
.task-row:last-child{border-bottom:none;padding-bottom:0}
.task-row:hover{background:var(--card2)}
.task-check{width:17px;height:17px;border-radius:50%;border:2px solid var(--border2);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.task-check.done{background:var(--green);border-color:var(--green)}
.task-check.done::after{content:'✓';font-size:9px;color:#000;font-weight:900}
.task-info{flex:1;min-width:0}
.task-title{font-size:13px;line-height:1.5;color:var(--text);transition:all .2s}
.task-title.done{text-decoration:line-through;color:var(--text3)}
.task-merit{font-size:11px;color:var(--text3);margin-top:2px;line-height:1.3}
.task-time{font-size:10px;color:var(--text3);background:var(--card2);padding:2px 7px;border-radius:8px;white-space:nowrap;flex-shrink:0}

.must-card{background:linear-gradient(135deg,#14102a,#1a1235);border:1px solid #3d2d7a;border-radius:12px;padding:12px 14px;margin-bottom:10px}
.must-tag{font-size:9px;color:var(--purple);font-weight:700;letter-spacing:.2em;margin-bottom:5px}
.must-text{font-size:13px;color:#c4b5fd;line-height:1.6}

.save-btn{display:flex;align-items:center;justify-content:center;gap:8px;background:var(--card);border:1px solid var(--border2);color:var(--purple);font-size:12px;font-weight:700;padding:11px;border-radius:10px;cursor:pointer;width:100%;margin-top:10px;transition:all .2s;font-family:inherit}
.save-btn:hover{background:var(--card2);border-color:var(--purple)}
.save-btn.saved{background:var(--green-dim);border-color:#2d5a3d;color:var(--green)}

.thumb-add-btn{display:flex;align-items:center;gap:6px;background:transparent;border:1px dashed var(--border2);color:var(--text3);font-size:12px;font-weight:600;padding:8px 12px;border-radius:8px;cursor:pointer;width:100%;margin-top:8px;transition:all .2s;font-family:inherit}
.thumb-add-btn:hover{border-color:var(--purple);color:#9b8bff}
.thumb-form{background:var(--card2);border:1px solid #2d2460;border-radius:8px;padding:12px;margin-top:6px;display:none}
.thumb-form.open{display:block;animation:fadeIn .2s ease}
.thumb-form-label{font-size:10px;color:var(--purple);font-weight:700;letter-spacing:.1em;margin-bottom:8px}
.thumb-form input{width:100%;background:#111;border:1px solid var(--border2);border-radius:6px;color:var(--text);font-size:13px;padding:9px 11px;font-family:inherit;outline:none;margin-bottom:8px}
.thumb-form input:focus{border-color:var(--purple)}
.thumb-form input[type=date]{color-scheme:dark}
.thumb-form-btns{display:flex;gap:8px;margin-top:4px}
.thumb-save-btn{background:var(--purple);border:none;color:#fff;font-size:12px;font-weight:700;padding:7px 18px;border-radius:20px;cursor:pointer}
.thumb-save-btn:disabled{background:#333;color:var(--text3);cursor:not-allowed}
.thumb-cancel-btn{background:transparent;border:1px solid var(--border2);color:var(--text3);font-size:12px;padding:7px 14px;border-radius:20px;cursor:pointer;font-family:inherit}

/* RIGHT COLUMN */
.right-col{display:flex;flex-direction:column;gap:10px}

.post-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px}
.post-header{display:flex;align-items:center;gap:6px;margin-bottom:8px}
.post-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.post-label{font-size:10px;font-weight:700;letter-spacing:.1em}
.post-chars{font-size:10px;color:var(--text3);margin-left:auto}
.post-body{font-size:12px;line-height:1.7;color:#ccc;white-space:pre-wrap;word-break:break-all;background:var(--card2);padding:10px;border-radius:8px;margin-bottom:8px}
.post-actions{display:flex;align-items:center;justify-content:flex-end;gap:8px}
.btn-copy{background:var(--purple);border:none;color:#fff;font-size:11px;font-weight:700;padding:5px 14px;border-radius:20px;cursor:pointer;transition:background .2s}
.btn-copy:hover{background:#8040d0}
.btn-copy.copied{background:var(--green);color:#000}
.btn-open{background:transparent;border:1px solid var(--border2);color:var(--text2);font-size:11px;padding:5px 12px;border-radius:20px;cursor:pointer;font-family:inherit}

.img-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px}
.img-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.img-label{font-size:10px;color:var(--green);font-weight:700;letter-spacing:.1em}
.img-theme{font-size:11px;color:var(--text3)}
.img-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px}
.img-cell{position:relative;aspect-ratio:16/9;border-radius:6px;overflow:hidden;background:var(--card2);border:1px solid var(--border)}
.img-cell img{width:100%;height:100%;object-fit:cover;display:block}
.img-cell-overlay{position:absolute;inset:0;background:rgba(0,0,0,0);display:flex;align-items:center;justify-content:center;transition:background .2s}
.img-cell:hover .img-cell-overlay{background:rgba(0,0,0,.5)}
.img-dl-btn{opacity:0;background:var(--purple);border:none;color:#fff;font-size:10px;font-weight:700;padding:4px 10px;border-radius:12px;cursor:pointer;transition:opacity .2s}
.img-cell:hover .img-dl-btn{opacity:1}
.img-dl-all{background:var(--green-dim);border:1px solid var(--green);color:var(--green);font-size:11px;font-weight:700;padding:5px 12px;border-radius:20px;cursor:pointer;font-family:inherit}
.img-post-body{font-size:11px;color:#aaa;line-height:1.6;background:var(--card2);padding:8px;border-radius:6px;margin-bottom:8px}

.qa-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px}
.qa-header{font-size:10px;color:var(--gold);font-weight:700;letter-spacing:.1em;margin-bottom:6px}
.qa-q{font-size:12px;color:#ccc;line-height:1.6;margin-bottom:8px}
.qa-input-wrap{position:relative}
.qa-input{width:100%;background:var(--card2);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-size:12px;padding:10px 40px 10px 10px;resize:vertical;min-height:70px;font-family:inherit;line-height:1.6;outline:none;transition:border-color .2s}
.qa-input:focus{border-color:var(--gold)}
.qa-mic{position:absolute;bottom:8px;right:8px;background:var(--card);border:1px solid var(--border2);border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;transition:all .2s}
.qa-mic:hover{background:var(--card2)}
.qa-mic.recording{background:#c0392b;border-color:#e74c3c;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(231,76,60,.4)}50%{box-shadow:0 0 0 6px rgba(231,76,60,0)}}
.qa-send{margin-top:8px;background:var(--gold);border:none;color:#000;font-size:11px;font-weight:700;padding:6px 16px;border-radius:20px;cursor:pointer;transition:background .2s}
.qa-send:hover{background:#d4920a}
.qa-send.sent{background:#4caf7d;color:#fff}

.quote-card{background:var(--card2);border-left:3px solid var(--purple);padding:10px 12px;border-radius:0 8px 8px 0;font-size:12px;color:var(--text2);font-style:italic;line-height:1.6}

/* WEEK / MONTH */
.wm-hero{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:14px}
.wm-tag{font-size:10px;color:var(--purple);font-weight:700;letter-spacing:.2em;margin-bottom:6px}
.wm-goal{font-size:15px;font-weight:700;color:#fff;line-height:1.5;margin-bottom:8px}
.wm-kr{font-size:12px;color:var(--text2);line-height:1.6}
.wm-progress{margin-top:12px}
.wm-plabel{font-size:11px;color:var(--text3);margin-bottom:4px}
.wm-pbar{height:5px;background:var(--border2);border-radius:3px;overflow:hidden}
.wm-pfill{height:100%;background:var(--purple);border-radius:3px;transition:width .5s ease}

.goal-item{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;background:var(--card);border-radius:10px;margin-bottom:6px;border:1px solid var(--border);cursor:pointer;transition:border-color .2s}
.goal-item:hover{border-color:var(--purple)}
.goal-item input[type=checkbox]{width:15px;height:15px;accent-color:#4caf7d;margin-top:2px;flex-shrink:0}
.goal-text{font-size:13px;line-height:1.5;flex:1}
.cat-badge{font-size:9px;padding:2px 7px;border-radius:10px;margin-left:6px;font-weight:600;white-space:nowrap}
.cat-booth{background:#1a1530;color:#9b8bff}
.cat-sns{background:#0d2020;color:#4ecdc4}
.cat-biz{background:#1a1200;color:var(--gold)}
.cat-revenue{background:#1a0f0f;color:var(--red)}

.kpi-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:14px}
.kpi-card{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:10px 12px}
.kpi-label{font-size:9px;color:var(--text3);letter-spacing:.1em;margin-bottom:4px}
.kpi-val{font-size:13px;font-weight:700;color:#fff}

.focus-card{background:linear-gradient(135deg,var(--card),#14102a);border:1px solid var(--border2);border-radius:12px;padding:14px;margin-bottom:14px}
.focus-label{font-size:9px;color:var(--purple);font-weight:700;letter-spacing:.2em;margin-bottom:6px}
.focus-text{font-size:13px;color:#c4b5fd;line-height:1.7}

/* HISTORY */
.hist-head{display:flex;align-items:center;justify-content:space-between;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 16px;margin-bottom:10px;font-size:12px;color:var(--text2)}
.hist-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:6px;transition:border-color .15s}
.hist-card:hover{border-color:var(--purple)}
.hist-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px}
.hist-date{font-size:16px;font-weight:800;color:#fff}
.hist-dow{font-size:12px;font-weight:400;color:var(--text2)}
.hist-day{font-size:10px;color:var(--text3);letter-spacing:.1em;margin-top:3px}
.hist-right{text-align:right}
.hist-pct{font-size:20px;font-weight:900;line-height:1}
.hist-cnt{font-size:10px;color:var(--text3);margin-top:3px}
.hist-bar{height:4px;background:var(--border2);border-radius:2px;overflow:hidden;margin-top:2px}
.hist-bar-fill{height:100%;border-radius:2px}
.empty{color:var(--text3);font-size:13px;padding:20px 0;text-align:center}
.spinner{text-align:center;color:var(--text3);padding:40px;font-size:13px}
.priority-badge{color:var(--red);font-size:9px;font-weight:700;margin-left:5px}

/* IMAGE SPINNER */
.image-spinner{display:flex;align-items:center;justify-content:center;aspect-ratio:16/9;background:var(--card2);border-radius:6px;color:var(--text3);font-size:11px}
</style>
</head>
<body>

<div id="lock-screen">
  <div class="lock-box">
    <div class="lock-icon">⚡</div>
    <div class="lock-title">SUGARR DASHBOARD</div>
    <div class="lock-sub">パスワードを入力</div>
    <input class="lock-input" id="lock-input" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')unlock()">
    <button class="lock-btn" onclick="unlock()">入る</button>
    <div class="lock-error" id="lock-error"></div>
  </div>
</div>

<div class="wrapper">
  <!-- TOP NAV -->
  <div class="top-nav">
    <div style="display:flex;align-items:center;gap:12px">
      <div class="brand">SUGARR</div>
      <div class="nav-tabs">
        <button class="nav-tab active" onclick="show('today',this)">📋 今日</button>
        <button class="nav-tab" onclick="show('week',this)">📅 今週</button>
        <button class="nav-tab" onclick="show('month',this)">🗓 今月</button>
        <button class="nav-tab" onclick="show('history',this)">📂 履歴</button>
      </div>
    </div>
    <div class="nav-right" id="nav-day-label">DAY —</div>
  </div>

  <!-- TODAY -->
  <div id="sec-today" class="section active">
    <!-- HERO -->
    <div class="hero-row">
      <div class="ring-wrap">
        <div class="ring-container">
          <svg class="ring" width="80" height="80" viewBox="0 0 80 80">
            <circle class="ring-bg" cx="40" cy="40" r="31"/>
            <circle class="ring-fill" id="ring-fill" cx="40" cy="40" r="31"/>
          </svg>
          <div class="ring-center">
            <div class="ring-pct" id="ring-pct">0%</div>
            <div class="ring-sub">完了</div>
          </div>
        </div>
        <div class="ring-label">今日の進捗</div>
      </div>
      <div class="hero-center">
        <div class="hero-day-badge" id="hero-day-badge">DAY —</div>
        <div class="hero-date" id="hero-date">読み込み中...</div>
        <div class="hero-sub" id="hero-sub"></div>
      </div>
      <div class="streak-card">
        <div class="streak-fire">🔥</div>
        <div class="streak-num" id="streak-num">—</div>
        <div class="streak-label">DAY STREAK</div>
      </div>
    </div>

    <!-- STATS -->
    <div class="stats-row">
      <div class="stat-card c-purple"><div class="stat-num" id="stat-tasks">—</div><div class="stat-label">TODAY TASKS</div></div>
      <div class="stat-card c-green"><div class="stat-num" id="stat-booth">18</div><div class="stat-label">BOOTH素材</div></div>
      <div class="stat-card c-pink"><div class="stat-num" id="stat-posts">3</div><div class="stat-label">投稿案</div></div>
      <div class="stat-card c-gold"><div class="stat-num" id="stat-images">4</div><div class="stat-label">背景画像</div></div>
    </div>

    <!-- MAIN GRID -->
    <div class="main-grid">
      <!-- LEFT: TASKS -->
      <div class="tasks-area" id="tasks-area">
        <div class="spinner">読み込み中...</div>
      </div>
      <!-- RIGHT: POSTS + IMAGES + QA -->
      <div class="right-col" id="right-col">
        <div class="spinner">読み込み中...</div>
      </div>
    </div>
  </div>

  <!-- WEEK -->
  <div id="sec-week" class="section">
    <div id="week-body"><div class="spinner">読み込み中...</div></div>
  </div>

  <!-- MONTH -->
  <div id="sec-month" class="section">
    <div id="month-body"><div class="spinner">読み込み中...</div></div>
  </div>

  <!-- HISTORY -->
  <div id="sec-history" class="section">
    <div class="wm-hero" style="margin-bottom:14px">
      <div class="wm-tag">HISTORY</div>
      <div class="wm-goal">過去のタスク履歴</div>
    </div>
    <div id="history-body"><div class="spinner">読み込み中...</div></div>
  </div>
</div>

<script>
var PASS="sugar2026";
var REPO="sugarsssss/tasks";
var RAW="https://raw.githubusercontent.com/"+REPO+"/main";
var API="https://api.github.com/repos/"+REPO;

function unlock(){
  var v=document.getElementById("lock-input").value;
  if(v===PASS){localStorage.setItem("auth","1");document.getElementById("lock-screen").classList.add("hidden");initAll();}
  else{document.getElementById("lock-error").textContent="パスワードが違います";document.getElementById("lock-input").value="";}
}

function show(name,btn){
  document.querySelectorAll(".nav-tab").forEach(function(b){b.classList.remove("active")});
  document.querySelectorAll(".section").forEach(function(s){s.classList.remove("active")});
  btn.classList.add("active");

function getDone(k){return JSON.parse(localStorage.getItem("done-"+k)||"{}")}
function setDone(k,id,v){var d=getDone(k);if(v)d[id]=true;else delete d[id];localStorage.setItem("done-"+k,JSON.stringify(d))}
function escHtml(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/\n/g,"&#10;")}

function countTasks(date){
  var all=document.querySelectorAll(".t-today").length;
  var done=Object.keys(getDone(date)).filter(function(k){return getDone(date)[k]}).length;
  return{all:all,done:done,pct:all?Math.round(done/all*100):0};
}
function updateProgress(date){
  var r=countTasks(date);
  document.getElementById("ring-pct").textContent=r.pct+"%";
  var circumference=2*Math.PI*31;
  var offset=circumference*(1-r.pct/100);
  document.getElementById("ring-fill").style.strokeDasharray=circumference;
  document.getElementById("ring-fill").style.strokeDashoffset=offset;
  document.getElementById("stat-tasks").textContent=r.all;
}

function toggleTask(row,date,id){

// ---- HISTORY ----
var histLoaded=false;
var DOW=["日","月","火","水","木","金","土"];
var DAY_START=new Date("2026-04-06");
function loadHistory(){
  if(histLoaded) return; histLoaded=true;
  fetch(API+"/contents/data/archive")
  .then(function(r){return r.json()})
  .then(function(files){
    var items=(files||[]).filter(function(f){return f.name&&f.name.endsWith(".json")})
      .sort(function(a,b){return b.name.localeCompare(a.name)});
    if(!items.length){document.getElementById("history-body").innerHTML='<div class="empty">履歴はまだありません。</div>';return;}
    var totalPct=0,pctCount=0;
    var cards="";
    items.forEach(function(f){
      var date=f.name.replace(".json","");
      var done=getDone(date);
      var doneN=Object.values(done).filter(Boolean).length;
      var totalN=Object.keys(done).length;
      var pct=totalN?Math.round(doneN/totalN*100):null;
      if(pct!==null){totalPct+=pct;pctCount++;}
      var d=new Date(date);
      var dow=DOW[d.getDay()];
      var mm=d.getMonth()+1;
      var dd=d.getDate();
      var dayNum=Math.max(1,Math.round((d-DAY_START)/(86400000))+1);
      var color=pct===null?"#444":pct>=80?"#00f5d4":pct>=50?"#f0a500":"#ff6060";
      cards+='<div class="hist-card">';
      cards+='<div class="hist-top">';
      cards+='<div>';
      cards+='<div class="hist-date">'+mm+'/'+dd+'<span class="hist-dow">（'+dow+'）</span></div>';
      cards+='<div class="hist-day">DAY '+dayNum+'</div>';
      cards+='</div>';
      cards+='<div class="hist-right">';
      if(pct!==null){
        cards+='<div class="hist-pct" style="color:'+color+'">'+pct+'%</div>';
        cards+='<div class="hist-cnt">'+doneN+' / '+totalN+' 完了</div>';
      } else {
        cards+='<div class="hist-pct" style="color:#444">—</div>';
        cards+='<div class="hist-cnt">チェック未記録</div>';
      }
      cards+='</div></div>';
      if(pct!==null){
        cards+='<div class="hist-bar"><div class="hist-bar-fill" style="width:'+pct+'%;background:'+color+'"></div></div>';
      }
      cards+='</div>';
    });
    var avg=pctCount?Math.round(totalPct/pctCount):null;
    var html='<div class="hist-head">';
    html+='<span>📅 <strong>'+items.length+'</strong> 日間の記録</span>';
    html+='<span>'+(avg!==null?'平均 <strong style="color:var(--green)">'+avg+'%</strong>達成':'')+'</span>';
    html+='</div>';
    html+=cards;
    document.getElementById("history-body").innerHTML=html;
  })
  .catch(function(){document.getElementById("history-body").innerHTML='<div class="empty">履歴はまだありません。</div>';});
}

// ---- ACTIONS ----
function copyPost(elId,btnId){
  var el=document.getElementById(elId);
  var btn=document.getElementById(btnId);
  if(!el||!btn) return;
  navigator.clipboard.writeText(el.innerText).then(function(){
    btn.textContent="✓ コピー済み";
    btn.classList.add("copied");
    setTimeout(function(){btn.textContent="コピー";btn.classList.remove("copied")},2000);
  });
}
function openThreads(elId){
  var el=document.getElementById(elId);
  if(!el) return;
  window.open("https://www.threads.net/intent/post?text="+encodeURIComponent(el.innerText),"_blank");
}
function downloadImage(url,idx){
  fetch(url).then(function(r){return r.blob()}).then(function(blob){
    var a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download=(window._bgTheme||"bg")+"_bg"+idx+".png";
    document.body.appendChild(a);a.click();document.body.removeChild(a);
  });
}
function downloadAllImages(){
  if(!window._bgImages) return;
  window._bgImages.forEach(function(url,i){setTimeout(function(){downloadImage(url,i+1)},i*400)});
}

function submitQA(date){
  var answer=document.getElementById("qa-input").value.trim();
  if(!answer){alert("回答を入力してください");return;}
  var btn=document.getElementById("qa-submit");
  btn.textContent="送信中...";btn.disabled=true;
  var GHT=localStorage.getItem("gh_token")||"";
  if(!GHT){GHT=prompt("GitHubトークンを入力（初回のみ）:");if(!GHT){btn.textContent="回答を送信";btn.disabled=false;return;}localStorage.setItem("gh_token",GHT);}
  var payload=JSON.stringify({date:date,answer:answer,submittedAt:new Date().toISOString()});
  var enc=btoa(unescape(encodeURIComponent(payload)));
  fetch(API+"/contents/data/qa_pending.json",{headers:{"Authorization":"token "+GHT}})
  .then(function(r){return r.json()})
  .then(function(ex){
    var body={message:"QA回答: "+date,content:enc};
    if(ex.sha) body.sha=ex.sha;
    return fetch(API+"/contents/data/qa_pending.json",{method:"PUT",headers:{"Authorization":"token "+GHT,"Content-Type":"application/json"},body:JSON.stringify(body)});
  }).then(function(r){return r.json()})
  .then(function(res){
    if(res.content){localStorage.setItem("qa-ans-"+date,answer);localStorage.setItem("qa-sent-"+date,"1");btn.textContent="✓ 送信済み";btn.classList.add("sent");btn.disabled=false;}
    else{btn.textContent="エラー。再試行";btn.disabled=false;}
  }).catch(function(){btn.textContent="エラー。再試行";btn.disabled=false;});
}

function toB64(obj){
  return btoa(encodeURIComponent(JSON.stringify(obj,null,2)).replace(/%([0-9A-F]{2})/g,function(m,p){return String.fromCharCode("0x"+p)}));
}
function saveCompleted(date){
  var done=getDone(date);
  var rows=document.querySelectorAll(".t-today");
  var totalIds=[];rows.forEach(function(el){totalIds.push(el.id.replace(/^t/,""))});
  var completedIds=Object.keys(done).filter(function(id){return done[id]});
  var pct=totalIds.length?Math.round(completedIds.length/totalIds.length*100):0;
  var btn=document.getElementById("save-completed-btn");
  btn.textContent="記録中...";btn.disabled=true;
  var GHT=localStorage.getItem("gh_token")||"";
  if(!GHT){GHT=prompt("GitHubトークンを入力（初回のみ）:");if(!GHT){btn.textContent="📊 今日の達成を記録する";btn.disabled=false;return;}localStorage.setItem("gh_token",GHT);}

  // Build lightweight summary (no merit/detail/images/posts)
  var d=window._todayData||{};
  var taskList=[];
  Object.keys(d.sections||{}).forEach(function(k){
    var sec=d.sections[k];
    (sec.tasks||[]).forEach(function(t){
      taskList.push({id:t.id,title:t.title||t.text||"",cat:k});
    });
  });
  var summary={
    date:date,
    dateJa:d.dateJa||date,
    pct:pct,
    completedIds:completedIds,
    total:totalIds.length,
    tasks:taskList,
    quote:d.quote||"",
    mustDo:d.mustDo||""
  };
  var enc=toB64(summary);
  var archivePath=API+"/contents/data/archive/"+date+".json";

  fetch(archivePath,{headers:{"Authorization":"token "+GHT}})
  .then(function(r){return r.ok?r.json():{}})
  .then(function(ex){
    var body={message:"達成記録: "+date,content:enc};
    if(ex.sha) body.sha=ex.sha;
    return fetch(archivePath,{method:"PUT",headers:{"Authorization":"token "+GHT,"Content-Type":"application/json"},body:JSON.stringify(body)});
  }).then(function(r){return r.json()})
  .then(function(res){
    if(res.content){localStorage.setItem("completed-saved-"+date,"1");btn.textContent="✓ 達成記録済み";btn.classList.add("saved");btn.disabled=false;}
    else{btn.textContent="エラー。再試行";btn.disabled=false;}
  }).catch(function(){btn.textContent="エラー。再試行";btn.disabled=false;});
}

function toggleThumbForm(){
  var f=document.getElementById("thumb-form");
  if(!f) return;
  f.classList.toggle("open");
  if(f.classList.contains("open")){
    var dt=new Date();dt.setDate(dt.getDate()+3);
    document.getElementById("thumb-deadline").value=dt.toISOString().split("T")[0];
    document.getElementById("thumb-name").focus();
  }
}
function saveThumb(){
  var date=localStorage.getItem("today-date")||new Date().toISOString().split("T")[0];
  var name=document.getElementById("thumb-name").value.trim();
  var deadline=document.getElementById("thumb-deadline").value;
  if(!name){alert("案件名を入力してください");return;}
  var btn=document.getElementById("thumb-save-btn");btn.textContent="保存中...";btn.disabled=true;
  var GHT=localStorage.getItem("gh_token")||"";
  if(!GHT){GHT=prompt("GitHubトークンを入力（初回のみ）:");if(!GHT){btn.textContent="追加する";btn.disabled=false;return;}localStorage.setItem("gh_token",GHT);}
  fetch(API+"/contents/data/today.json",{headers:{"Authorization":"token "+GHT}})
  .then(function(r){return r.json()})
  .then(function(res){
    var data=JSON.parse(atob(res.content.replace(/\n/g,"")));
    if(!data.sections.thumbnail) data.sections.thumbnail={label:"🖼 サムネ作成",tasks:[]};
    var tasks=data.sections.thumbnail.tasks;
    var newId="th"+(tasks.length+1)+"-"+Date.now().toString(36);
    tasks.push({id:newId,title:"【締切"+deadline+"】"+name+"のサムネを完成させる",merit:"納品実績が積み上がり次の案件につながる",time:"60分",deadline:deadline});
    var enc=btoa(encodeURIComponent(JSON.stringify(data,null,2)).replace(/%([0-9A-F]{2})/g,function(m,p){return String.fromCharCode("0x"+p)}));
    return fetch(API+"/contents/data/today.json",{method:"PUT",headers:{"Authorization":"token "+GHT,"Content-Type":"application/json"},body:JSON.stringify({message:"サムネ追加: "+name,content:enc,sha:res.sha})});
  }).then(function(r){return r.json()})
  .then(function(res){
    if(res.content){btn.textContent="✓ 追加しました";setTimeout(function(){location.reload()},800);}
    else{btn.textContent="エラー。再試行";btn.disabled=false;}
  }).catch(function(){btn.textContent="エラー。再試行";btn.disabled=false;});
}

function imgErr(img){ img.parentNode.innerHTML='<div class="image-spinner">生成中...</div>'; }
var micRecognition=null,micActive=false;
function toggleMic(){
  var btn=document.getElementById("qa-mic-btn");
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){alert("このブラウザは音声入力に対応していません");return;}
  if(micActive){if(micRecognition)micRecognition.stop();return;}
  micRecognition=new SR();
  micRecognition.lang="ja-JP";micRecognition.continuous=true;micRecognition.interimResults=false;
  micRecognition.onstart=function(){micActive=true;btn.classList.add("recording");btn.title="録音中"};
  micRecognition.onresult=function(e){
    var txt="";
    for(var i=e.resultIndex;i<e.results.length;i++){if(e.results[i].isFinal)txt+=e.results[i][0].transcript}
    var ta=document.getElementById("qa-input");
    if(ta&&txt)ta.value+=(ta.value?"　":"")+txt;
  };
  micRecognition.onend=function(){micActive=false;btn.classList.remove("recording");btn.title="音声入力"};
  micRecognition.onerror=function(){micActive=false;btn.classList.remove("recording")};
  micRecognition.start();
}
</script>
